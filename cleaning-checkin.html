<body>
  <article class="app">
    <header class="hero">
      <section class="hero-card">
        <p class="eyebrow">Cleaning Check-in Dashboard</p>
        <h1>房间清洁打卡看板</h1>
        <p class="lead">每个区域和房间都可以指定负责人。负责人完成打扫后点击提交，即代表当天已打卡；所有人打开网页都能看到房间状态和记录。</p>
        <div class="date-pill" id="todayLabel">今天</div>
        <p class="note">提示：当前版本为本地网页原型，数据保存在本机浏览器。需要多人实时同步时，可接入共享服务器、数据库或企业微信/飞书表格。</p>
      </section>
      <aside class="side-card panel">
        <div class="metric">
          <strong id="metricTotal">0</strong>
          <span>房间总数</span>
        </div>
        <div class="metric">
          <strong id="metricDone">0</strong>
          <span>今日已打卡</span>
        </div>
        <div class="metric">
          <strong id="metricRate">0%</strong>
          <span>今日完成率</span>
        </div>
      </aside>
    </header>

    <main>
      <section class="panel">
        <div class="panel-title">
          <h2>今日进度</h2>
          <span class="summary-line" id="summaryText">正在统计</span>
        </div>
        <div class="progress" aria-label="今日完成进度"><span id="progressBar"></span></div>
        <div class="actions">
          <button class="btn primary" id="addRoomBtn">新增房间</button>
          <button class="btn orange" id="exportBtn">导出数据</button>
          <button class="btn" id="importBtn">导入数据</button>
          <button class="btn danger" id="resetDemoBtn">恢复示例</button>
          <input class="file-input" type="file" id="importFile" accept="application/json">
        </div>
        <div class="toolbar">
          <div class="field">
            <label for="searchInput">搜索房间或负责人</label>
            <input id="searchInput" type="search" placeholder="例如：餐厅、张三、中控室">
          </div>
          <div class="field">
            <label for="dateInput">查看日期</label>
            <input id="dateInput" type="date">
          </div>
          <div class="field">
            <label for="areaFilter">区域</label>
            <select id="areaFilter"></select>
          </div>
          <div class="field">
            <label for="statusFilter">状态</label>
            <select id="statusFilter">
              <option value="all">全部状态</option>
              <option value="done">已打卡</option>
              <option value="pending">未打卡</option>
            </select>
          </div>
        </div>
      </section>

      <section id="roomsRoot" aria-live="polite"></section>

      <section class="panel">
        <div class="panel-title">
          <h2>最近打卡记录</h2>
          <span class="summary-line">按提交时间倒序</span>
        </div>
        <div class="history" id="historyRoot"></div>
      </section>
    </main>
  </article>

  <div class="modal" id="checkinModal" role="dialog" aria-modal="true" aria-labelledby="checkinTitle">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <p class="eyebrow">提交打卡</p>
          <h2 id="checkinTitle">已打扫，提交打卡</h2>
        </div>
        <button class="btn" data-close="checkinModal">关闭</button>
      </div>
      <form id="checkinForm" class="form-grid">
        <input type="hidden" id="checkinRoomId">
        <div class="field">
          <label for="checkinPerson">打卡人</label>
          <input id="checkinPerson" required placeholder="请输入姓名">
        </div>
        <div class="field">
          <label for="checkinTime">打卡时间</label>
          <input id="checkinTime" type="time" required>
        </div>
        <div class="field wide">
          <label for="checkinNote">备注</label>
          <textarea id="checkinNote" placeholder="可填写清洁情况、异常问题或无需备注"></textarea>
        </div>
        <div class="field wide">
          <button class="btn primary" type="submit">确认提交</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="roomModal" role="dialog" aria-modal="true" aria-labelledby="roomTitle">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <p class="eyebrow">房间管理</p>
          <h2 id="roomTitle">新增房间</h2>
        </div>
        <button class="btn" data-close="roomModal">关闭</button>
      </div>
      <form id="roomForm" class="form-grid">
        <input type="hidden" id="roomId">
        <div class="field">
          <label for="roomArea">区域</label>
          <input id="roomArea" required placeholder="例如：餐厅">
        </div>
        <div class="field">
          <label for="roomName">房间</label>
          <input id="roomName" required placeholder="例如：大厅">
        </div>
        <div class="field">
          <label for="roomOwner">负责人</label>
          <input id="roomOwner" required placeholder="例如：王师傅">
        </div>
        <div class="field">
          <label for="roomFrequency">频率</label>
          <select id="roomFrequency">
            <option value="每日">每日</option>
            <option value="每班">每班</option>
            <option value="每周">每周</option>
            <option value="按需">按需</option>
          </select>
        </div>
        <div class="field wide">
          <label for="roomStandard">清洁要求</label>
          <textarea id="roomStandard" placeholder="例如：地面无水渍，桌面无油污，设备表面擦拭"></textarea>
        </div>
        <div class="field wide">
          <button class="btn primary" type="submit">保存房间</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="./assets/app.js"></script>
</body>
</html>
